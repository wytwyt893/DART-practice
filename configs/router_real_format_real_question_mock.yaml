# 这个配置文件定义了一个实验的参数设置
# 主要用于训练一个基于真实问题嵌入的路由器模型
experiment_name: router_real_format_real_question_mock
seed: 42

data:
  data_path: TableDART-Official/TableDART/data/test/test_data.jsonl
  max_samples: null
  samples_per_category: 64
  text_dim: 3584
  image_dim: 6144
  question_dim: 384
  num_routes: 3
  train_ratio: 0.8
  use_real_question_embedding: true
  question_embed_model_id: sentence-transformers/all-MiniLM-L6-v2

model:
  text_dim: 3584
  image_dim: 6144
  question_dim: 384
  hidden_dim: 256
  dropout: 0.1
  num_routes: 3

training:
  epochs: 10
  train_batch_size: 64
  val_batch_size: 128
  lr: 0.001

outputs:
  log_file: logs/router_real_format_real_question_mock_log.txt
  last_checkpoint: checkpoints/router_real_format_real_question_mock_last.pth
  best_checkpoint: checkpoints/router_real_format_real_question_mock_best.pth